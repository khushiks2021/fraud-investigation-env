version: "3.9"

services:
  fraud-env:
    build:
      context: .
      dockerfile: server/Dockerfile

    ports:
      - "8000:8000"
    command: uvicorn server.app:app --host 0.0.0.0 --port 8000

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5